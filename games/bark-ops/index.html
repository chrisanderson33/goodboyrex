const BASE_W = 800, BASE_H = 450;
let SCALE = 1;
function resizeCanvas(){
  const aspect = BASE_W/BASE_H;
  let w = window.innerWidth, h = window.innerHeight;
  if(w/h > aspect){ w = Math.floor(h*aspect); } else { h = Math.floor(w/aspect); }
  canvas.width = w; canvas.height = h;
  SCALE = w/BASE_W;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Scale helpers
function S(v){ return v*SCALE; }
function SR(x,y,w,h,color){
  ctx.fillStyle = color;
  ctx.fillRect(S(x),S(y),S(w),S(h));
}
function SRC(x,y,w,h,color){
  ctx.strokeStyle = color;
  ctx.strokeRect(S(x)+0.5,S(y)+0.5,S(w),S(h));
}
// 32-bit gradient fill helper
function SRG(x,y,w,h,c1,c2,vertical){
  const grd = vertical!==false
    ? ctx.createLinearGradient(S(x),S(y),S(x),S(y+h))
    : ctx.createLinearGradient(S(x),S(y),S(x+w),S(y));
  grd.addColorStop(0,c1); grd.addColorStop(1,c2);
  ctx.fillStyle = grd;
  ctx.fillRect(S(x),S(y),S(w),S(h));
}
// Rounded rect helper
function SRR(x,y,w,h,r,color){
  ctx.fillStyle = color;
  ctx.beginPath();
  const sx=S(x),sy=S(y),sw=S(w),sh=S(h),sr=S(r);
  ctx.moveTo(sx+sr,sy); ctx.lineTo(sx+sw-sr,sy); ctx.quadraticCurveTo(sx+sw,sy,sx+sw,sy+sr);
  ctx.lineTo(sx+sw,sy+sh-sr); ctx.quadraticCurveTo(sx+sw,sy+sh,sx+sw-sr,sy+sh);
  ctx.lineTo(sx+sr,sy+sh); ctx.quadraticCurveTo(sx,sy+sh,sx,sy+sh-sr);
  ctx.lineTo(sx,sy+sr); ctx.quadraticCurveTo(sx,sy,sx+sr,sy);
  ctx.closePath(); ctx.fill();
}
// Circle helper
function SC(x,y,r,color){
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(S(x),S(y),S(r),0,Math.PI*2); ctx.fill();
}
// Color interpolation for smooth gradients
function lerpColor(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&255,ag=(ah>>8)&255,ab=ah&255;
  const br=(bh>>16)&255,bg=(bh>>8)&255,bb=bh&255;
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return `rgb(${r},${g},${bl})`;
}
// Text with drop shadow
function drawText(text,x,y,color,size){
  ctx.font=`${S(size||8)}px 'Press Start 2P', monospace`;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillText(text,S(x)+S(1),S(y)+S(1));
  ctx.fillStyle=color;
  ctx.fillText(text,S(x),S(y));
}

// --- AUDIO ---
let audioCtx = null;
function getAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}
function playTone(freq, type, duration, volume, decay){
  const ac = getAudio(); if(!ac) return;
  try {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type||'square';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*(decay||1), ac.currentTime+duration);
    gain.gain.setValueAtTime(volume||0.15, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime+duration+0.05);
  } catch(e){}
}

let particles = [];
function spawnParticles(x, y, count, colors, opts){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = (opts&&opts.speed||2) * (0.5+Math.random());
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed*(opts&&opts.spreadX||1),
      vy: Math.sin(angle)*speed*(opts&&opts.spreadY||1) - (opts&&opts.upBias||0),
      life: 1, decay: 0.04+Math.random()*0.04,
      size: (opts&&opts.size||3) * (0.5+Math.random()*0.5),
      color: colors[Math.floor(Math.random()*colors.length)],
      gravity: opts&&opts.gravity||0,
      shape: opts&&opts.shape||'square'
    });
  }
}
function spawnHitParticles(x, y, color){
  spawnParticles(x, y, 8, [color, P.cream, P.white], {speed:3, size:3});
}
function spawnDeathParticles(x, y, color){
  spawnParticles(x, y, 24, [color, P.orange, P.yellow, P.cream], {speed:5, size:4, gravity:0.15, shape:'circle'});
}
function spawnExplosion(x, y){
  spawnParticles(x, y, 30, [P.orange, P.lava, P.yellow, P.red], {speed:6, size:5, gravity:0.1, shape:'circle'});
  spawnParticles(x, y, 15, [P.cream, P.creamDk], {speed:3, size:2, shape:'circle'});
}
function spawnSteam(x, y){
  spawnParticles(x, y, 3, [P.creamDk, P.gray, P.grayDark], {speed:0.8, size:3, upBias:1.5, gravity:-0.05, spreadX:0.5});
}
function spawnLavaBubble(x, y){
  spawnParticles(x, y, 5, [P.lava, P.lavaGlow, P.orange], {speed:2, size:3, upBias:2, gravity:0.05});
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity||0;
    p.vx *= 0.95; p.vy *= 0.97;
    p.life -= p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = p.life;
    const sz = p.size*p.life;
    if(p.shape === 'circle'){
      SC(p.x, p.y, sz/2, p.color);
    } else {
      // Glow effect for fire-colored particles
      if(p.color===P.orange||p.color===P.lava||p.color===P.yellow||p.color===P.lavaGlow){
        ctx.globalAlpha = p.life*0.15;
        SR(p.x-sz, p.y-sz, sz*2, sz*2, p.color);
        ctx.globalAlpha = p.life;
      }
      SR(p.x-sz/2, p.y-sz/2, sz, sz, p.color);
    }
  }
  ctx.globalAlpha = 1;
}

// --- DAMAGE NUMBERS ---
let dmgNumbers = [];
function spawnDmg(x, y, text, color){
  dmgNumbers.push({x, y, text, color: color||P.yellow, life:1.2, vy:-0.8});
}
function updateDmgNumbers(){
  for(let i=dmgNumbers.length-1;i>=0;i--){
    dmgNumbers[i].y += dmgNumbers[i].vy;
    dmgNumbers[i].life -= 0.025;
    if(dmgNumbers[i].life<=0) dmgNumbers.splice(i,1);
  }
}
function drawDmgNumbers(){
  for(const d of dmgNumbers){
    ctx.globalAlpha = Math.min(1, d.life);
    ctx.font = `${S(8)}px 'Press Start 2P', monospace`;
    ctx.textAlign = 'center';
    // Drop shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(d.text, S(d.x)+S(1), S(d.y)+S(1));
    ctx.fillStyle = d.color;
    ctx.fillText(d.text, S(d.x), S(d.y));
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// 16×16 sprite renderer: data=row strings, pal=char->color, ps=pixel size
function drawSpr(ox, oy, data, pal, ps) {
  ps = ps || 2;
  for (let r = 0; r < data.length; r++) {
    const row = data[r];
    for (let c = 0; c < row.length; c++) {
      if (row[c] === '.') continue;
      const color = pal[row[c]];
      if (color) SR(ox + c * ps, oy + r * ps, ps, ps, color);
    }
  }
}

function px4(x, y, color){ SR(x, y, 4, 4, color); }
function px8(x, y, color){ SR(x, y, 8, 8, color); }

// --- DODGE TRAIL ---
let dodgeTrail = [];
function updateDodgeTrail(player){
  if(player.dodging){
    dodgeTrail.push({x:player.x, y:player.y, facing:player.facing, life:1});
  }
  for(let i=dodgeTrail.length-1;i>=0;i--){
    dodgeTrail[i].life -= 0.12;
    if(dodgeTrail[i].life<=0) dodgeTrail.splice(i,1);
  }
}
function drawDodgeTrail(){
  for(const t of dodgeTrail){
    ctx.globalAlpha = t.life*0.35;
    drawRex(t.x, t.y, t.facing, 0, 'idle', false);
  }
  ctx.globalAlpha = 1;
}

let bgStars = [];
for(let i=0;i<60;i++) bgStars.push({x:Math.random()*BASE_W, y:Math.random()*BASE_H*0.5, s:1+Math.random()*2, b:Math.random()});

function drawBackground(){
  // Per-level sky colors
  const skyThemes = [
    [P.bgDark, P.bgMid, P.bgDeep],        // L1: night patrol
    ['#0a1428', '#102040', '#183060'],      // L2: underground lab (deep blue)
    [P.purpDeep, P.purpDark, '#1a1030'],    // L3: enemy territory (purple dusk)
    ['#1a1014', '#2a1824', '#0a0a14'],      // L4: fortress (dark crimson)
    ['#200808', '#301010', '#100404']        // L5: volcano lair (deep red)
  ];
  const groundThemes = [
    [P.milGreen, P.milMid, P.milLight],     // L1: grass
    [P.grayDark, P.gray, P.grayDeep],       // L2: concrete
    [P.tanDeep, P.tanDark, P.tan],          // L3: dirt/sand
    [P.metalDk, P.metal, P.grayDeep],       // L4: metal floor
    [P.redDeep, P.redDark, P.red]           // L5: volcanic rock
  ];
  const buildingColors = [P.grayDeep, P.blueDeep, P.purpDeep, P.grayDark, P.redDeep];

  const li = Math.min(level-1, 4);
  const sky = skyThemes[li];
  const gnd = groundThemes[li];

  // Sky - smooth 8-band gradient (32-bit style)
  const bandH = Math.ceil(GROUND_Y / 8);
  for(let i=0;i<8;i++){
    const t = i/7;
    const ci = t < 0.5 ? 0 : 1;
    const ct = t < 0.5 ? t*2 : (t-0.5)*2;
    const c = lerpColor(sky[ci], sky[ci+1], ct);
    SR(0, i*bandH, BASE_W, bandH+1, c);
  }

  // Stars (not in underground lab)
  if(level !== 2){
    for(const s of bgStars){
      const twinkle = Math.sin(frame*0.05+s.b*10)*0.3+0.7;
      ctx.globalAlpha = twinkle * (s.b*0.5+0.5);
      // Larger stars get a glow
      if(s.s > 1.5){
        ctx.globalAlpha *= 0.15;
        SC(s.x+s.s/2, s.y+s.s/2, s.s+1, P.creamLight);
        ctx.globalAlpha = twinkle * (s.b*0.5+0.5);
      }
      SR(s.x, s.y, s.s, s.s, P.cream);
    }
    ctx.globalAlpha = 1;
  }

  // Level-specific background elements
  const bOff = (frame*0.3)%BASE_W;

  // Parallax far buildings (slow scroll, darker, behind main buildings)
  if(level !== 2){
    const farOff = (frame*0.1)%BASE_W;
    ctx.globalAlpha = 0.35;
    for(let i=0;i<8;i++){
      const bx = ((i*130 - farOff)%BASE_W+BASE_W)%BASE_W - 50;
      const bh = 20 + (i*23%20);
      SR(bx, GROUND_Y-bh, 50, bh, P.black);
      SR(bx+8, GROUND_Y-bh+5, 4, 4, P.yelShadow||P.yelDeep);
      SR(bx+28, GROUND_Y-bh+7, 4, 4, P.yelShadow||P.yelDeep);
    }
    ctx.globalAlpha = 1;
  }

  if(level === 2){
    // Lab: pipes and panels with metallic shading
    for(let i=0;i<8;i++){
      const px = ((i*120)%BASE_W+BASE_W)%BASE_W;
      SRG(px, 80, 4, GROUND_Y-80, P.gray, P.grayDark); // pipe gradient
      SR(px-1, 80, 6, 4, P.gray);
      SR(px-1, 80, 6, 1, P.grayLight);                  // bracket highlight
      SR(px-1, GROUND_Y-40, 6, 4, P.gray);
      SR(px-1, GROUND_Y-40, 6, 1, P.grayLight);
      if(i%2===0){
        SR(px+15, 120, 30, 20, P.grayDeep);
        SRG(px+17, 122, 26, 16, P.blueDeep, P.blueShadow||P.blueDeep);
        SR(px+17, 122, 26, 2, P.blueDark);               // panel highlight
        SR(px+20, 125, 4, 4, frame%60<30?P.hudBright:P.hudDark);
        if(frame%60<30){
          ctx.globalAlpha=0.15; SR(px+18,123,8,8,P.hudBright); ctx.globalAlpha=1; // light glow
        }
      }
    }
  } else {
    // Buildings / scenery with shading
    for(let i=0;i<10;i++){
      const bx = ((i*100 - bOff)%BASE_W+BASE_W)%BASE_W - 50;
      const bh = 40 + (i*37%30);
      SR(bx, GROUND_Y-bh, 40, bh, buildingColors[li]);
      SR(bx, GROUND_Y-bh, 40, 4, lerpColor(buildingColors[li],'#ffffff',0.1)); // roof highlight
      SR(bx, GROUND_Y-4, 40, 4, P.black);                // base shadow
      // Windows with glow
      SR(bx+5, GROUND_Y-bh+10, 6, 6, P.yelDeep);
      SR(bx+5, GROUND_Y-bh+10, 6, 2, P.yelDark);       // window highlight
      SR(bx+20, GROUND_Y-bh+8, 6, 6, P.yelDeep);
      SR(bx+20, GROUND_Y-bh+8, 6, 2, P.yelDark);
      ctx.globalAlpha=0.08;
      SR(bx+3, GROUND_Y-bh+8, 10, 10, P.yellow);        // window light glow
      SR(bx+18, GROUND_Y-bh+6, 10, 10, P.yellow);
      ctx.globalAlpha=1;
      if(level >= 4){
        // Fortress: turrets with metallic shading
        SRG(bx+10, GROUND_Y-bh-8, 20, 10, P.gray, P.grayDark);
        SRG(bx+14, GROUND_Y-bh-12, 12, 6, P.metalLight, P.metalDk);
      }
    }
  }

  // Level 5: lava pools with glow
  if(level === 5){
    for(let i=0;i<5;i++){
      const lx = (i*180+40)%BASE_W;
      SRG(lx, GROUND_Y-4, 30, 4, P.lavaGlow, P.lava);
      ctx.globalAlpha=0.15; SR(lx-4, GROUND_Y-8, 38, 10, P.lava); ctx.globalAlpha=1; // lava glow
      if(frame%30<15){
        SR(lx+5, GROUND_Y-6, 8, 3, P.lavaBright);
      }
      if(frame%20===0 && Math.random()<0.3) spawnLavaBubble(lx+15, GROUND_Y-6);
    }
    // Heat shimmer particles
    if(frame%10===0) spawnParticles(Math.random()*BASE_W, GROUND_Y-5, 1,
      [P.creamDk], {speed:0.3, size:1, upBias:0.8, gravity:-0.02});
  }

  // Ground with gradient (3-strip shading)
  SRG(0, GROUND_Y, BASE_W, BASE_H-GROUND_Y, gnd[1], gnd[0]);
  SR(0, GROUND_Y, BASE_W, 3, gnd[2]);                    // top edge highlight
  SR(0, GROUND_Y+3, BASE_W, 1, gnd[1]);                  // secondary edge

  // Ground details with varied sizes
  for(let i=0;i<20;i++){
    const gx = (i*45 + frame*0.2)%BASE_W;
    SR(gx, GROUND_Y+5+Math.sin(i)*2, 8, 2, gnd[2]);
    if(i%3===0) SR(gx+12, GROUND_Y+7+Math.cos(i)*2, 4, 1, gnd[2]); // extra detail
  }
}

  ctx.textAlign = 'right';

  // Combo with glow
  if(comboCount > 1 && comboTimer > 0){

    // Combo glow
    ctx.globalAlpha = 0.2;

    SRG(0, BASE_H/2-40, BASE_W, 60, 'rgba(0,0,0,0.9)', 'rgba(0,0,0,0.5)');

    SR(0, BASE_H/2+19, BASE_W, 1, P.yelDark);    // bottom border
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    const titles = LEVEL_INTROS.map(l=>l.title);
    drawText(titles[Math.min(level-1,4)], BASE_W/2, BASE_H/2 - 15, P.yellow, 14);
    const objectives = ['CLEAR ALL HOSTILES','INFILTRATE THE LAB','DEFEAT COL. CLAW','BREACH THE FORTRESS','DEFEAT DR. WHISKERS'];
    drawText(objectives[Math.min(level-1,4)], BASE_W/2, BASE_H/2 + 10, P.cream, 7);
    ctx.globalAlpha = 1;
  }

  // Low HP warning with glow
  if(lives <= 2){
    const hpColor = frame%20<10 ? P.red : P.yellow;
    ctx.textAlign = 'left';
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = P.red;
    ctx.font = `${S(8)}px 'Press Start 2P', monospace`;
    ctx.fillText('LOW HP!', S(90), S(16));
    ctx.globalAlpha = 1;
    drawText('LOW HP!', 90, 16, hpColor, 7);
  }

  // Controls hint
  if(controlsHintTimer > 0){
    controlsHintTimer--;
    const hintAlpha = Math.min(1, controlsHintTimer / 60);
    ctx.globalAlpha = hintAlpha * 0.9;
    SRR(BASE_W/2-160, BASE_H-55, 320, 50, 3, P.black);

    ctx.globalAlpha = hintAlpha;

    drawText('ARROWS/WASD: MOVE', BASE_W/2, BASE_H-42, P.yellow, 7);
    drawText('SPACE: BITE  SHIFT: DODGE', BASE_W/2, BASE_H-28, P.yellow, 7);
    ctx.globalAlpha = 1;
  }

  ctx.textAlign = 'left';
}

// ============================================================
// PLAYER OBJECT
// ============================================================
const GROUND_Y = BASE_H - 60;
const player = {
  x: 100, y: GROUND_Y,
  vx: 0, vy: 0,
  facing: 1,
  animFrame: 0, animTimer: 0,
  action: 'idle',
  attacking: false, attackTimer: 0, attackCooldown: 0,
  dodging: false, dodgeTimer: 0, dodgeCooldown: 0,
  invuln: 0,
  shieldTimer: 0,
  speed: 4,
  damage: 2,
  stunTimer: 0,
  hitbox: {w:20, h:24}
};

function resetPlayer(){
  player.x = 100; player.y = GROUND_Y;
  player.vx = 0; player.vy = 0;
  player.facing = 1; player.animFrame = 0;
  player.action = 'idle';
  player.attacking = false; player.attackTimer = 0; player.attackCooldown = 0;
  player.dodging = false; player.dodgeTimer = 0; player.dodgeCooldown = 0;
  player.invuln = 120; player.shieldTimer = 0; player.stunTimer = 0;
}

function updatePlayer(){
  if(player.stunTimer > 0){ player.stunTimer--; return; }

  // Movement
  let mx = 0, my = 0;
  if(keys['ArrowLeft'] || keys['KeyA']){ mx = -1; player.facing = -1; }
  if(keys['ArrowRight'] || keys['KeyD']){ mx = 1; player.facing = 1; }
  if(keys['ArrowUp'] || keys['KeyW']){ my = -1; }
  if(keys['ArrowDown'] || keys['KeyS']){ my = 1; }

  if(!player.dodging && !player.attacking){
    player.vx = mx * player.speed;
    player.vy = my * player.speed;
  }

  // Dodge (Shift)
  if((justPressed['ShiftLeft']||justPressed['ShiftRight']) && player.dodgeCooldown<=0 && !player.dodging){
    player.dodging = true;
    player.dodgeTimer = 12;
    player.dodgeCooldown = 20;
    player.vx = player.facing * 6;
    sfxDodge();
  }

  if(player.dodging){
    player.dodgeTimer--;
    if(player.dodgeTimer <= 0){ player.dodging = false; player.vx = 0; }
  }

  if(player.dodgeCooldown > 0) player.dodgeCooldown--;

  // Attack (Space / Z)
  if((justPressed['Space']||justPressed['KeyZ']) && player.attackCooldown<=0 && !player.dodging){
    player.attacking = true;
    player.attackTimer = 18;
    player.attackCooldown = 12;
    player.action = 'attack';
    sfxBite();
  }

  if(player.attacking){
    player.attackTimer--;
    if(player.attackTimer <= 0){ player.attacking = false; player.action = 'idle'; player.invuln = Math.max(player.invuln, 60); }
  }

  if(player.attackCooldown > 0) player.attackCooldown--;

  // Apply movement
  player.x += player.vx;
  player.y += player.vy;

  // Bounds
  player.x = Math.max(14, Math.min(BASE_W-14, player.x));
  player.y = Math.max(60, Math.min(GROUND_Y, player.y));

  // Animation
  if(mx!==0 || my!==0){
    player.animTimer++;
    if(player.animTimer > 6){ player.animFrame++; player.animTimer=0; }
    if(!player.attacking) player.action = 'walk';
  } else {
    if(!player.attacking) player.action = 'idle';
  }

  if(player.invuln > 0) player.invuln--;
  if(player.shieldTimer > 0) player.shieldTimer--;

  updateDodgeTrail(player);
}

function drawPlayer(){
  drawDodgeTrail();

  // Flash when invulnerable
  if(player.invuln > 0 && frame%8 < 3) return;

  // Draw the sprite
  drawRex(player.x, player.y, player.facing, player.animFrame, player.action, player.dodging);

  // Small bouncing triangle arrow above player
  const arrowBob = Math.sin(frame*0.12)*2;
  const ay = player.y - 38 + arrowBob;
  SR(player.x-1, ay,   2, 2, P.yellow);
  SR(player.x-3, ay+2, 6, 2, P.yellow);
  SR(player.x-5, ay+4, 10, 2, P.yelDark);

  // Shield effect - 32-bit double ring with glow
  if(player.shieldTimer > 0){
    const pulse = Math.sin(frame*0.2)*0.1;
    // Outer glow
    ctx.globalAlpha = 0.1 + pulse*0.5;
    ctx.fillStyle = P.blueLight;
    ctx.beginPath();
    ctx.arc(S(player.x), S(player.y-10), S(22), 0, Math.PI*2);
    ctx.fill();
    // Inner ring
    ctx.globalAlpha = 0.3 + pulse;
    ctx.strokeStyle = P.blueLight;
    ctx.lineWidth = S(1);
    ctx.beginPath();
    ctx.arc(S(player.x), S(player.y-10), S(16), 0, Math.PI*2);
    ctx.stroke();
    // Outer ring
    ctx.globalAlpha = 0.4 + pulse;
    ctx.strokeStyle = P.blue;
    ctx.lineWidth = S(2);
    ctx.beginPath();
    ctx.arc(S(player.x), S(player.y-10), S(20), 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function playerAttackHitbox(){
  if(!player.attacking) return null;
  const w = 60, h = 36;
  return {
    x: player.facing > 0 ? player.x - 5 : player.x - w + 5,
    y: player.y - 26,
    w, h
  };
}

function hurtPlayer(){
  if(player.invuln > 0 || player.dodging || player.attacking) return;
  if(player.shieldTimer > 0){
    player.shieldTimer = 0;
    spawnHitParticles(player.x, player.y-10, P.blue);
    sfxDodge();
    return;
  }
  lives--;
  player.invuln = 120;
  shakeDur = 10;
  sfxHit();
  spawnHitParticles(player.x, player.y-10, P.red);
  spawnDmg(player.x, player.y-30, 'OUCH!', P.red);
  if(lives <= 0){
    sfxDeath();
    spawnDeathParticles(player.x, player.y-10, P.tan);
    gameOverMsg = GAME_OVER_MESSAGES[Math.floor(Math.random()*GAME_OVER_MESSAGES.length)];
    gameState = 'gameOver';
  }
}

let enemies = [];
let projectiles = [];

const ENEMY_DEFS = {
  cat:        { hp:1, speed:0.45, score:100, color:P.gray,     w:20, h:24 },
  laserCat:   { hp:2, speed:0.4,  score:200, color:P.blue,     w:20, h:24, shoots:true, shootRate:200 },
  armoredCat: { hp:3, speed:0.28, score:300, color:P.grayDark, w:20, h:24 },
  scientist:  { hp:1, speed:0.4,  score:150, color:P.cream,    w:20, h:24 },
  commando:   { hp:2, speed:0.6,  score:250, color:P.orange,   w:20, h:24 },
  stunBaton:  { hp:2, speed:0.45, score:200, color:P.purple,   w:20, h:24, stuns:true },
  sniper:     { hp:1, speed:0.25, score:300, color:P.milGreen, w:20, h:24, shoots:true, shootRate:240 },
  guardDog:   { hp:5, speed:0.2,  score:500, color:P.metal,    w:36, h:34 }
};

const LEVEL_WAVES = [
  // Level 1 - easy intro
  [
    [{type:'cat',count:2,delay:90}],
    [{type:'cat',count:2,delay:70}],
    [{type:'cat',count:3,delay:60},{type:'laserCat',count:1,delay:100}]
  ],
  // Level 2
  [
    [{type:'cat',count:2,delay:70},{type:'laserCat',count:1,delay:100}],
    [{type:'commando',count:1,delay:80},{type:'cat',count:2,delay:60}],
    [{type:'armoredCat',count:1,delay:90},{type:'laserCat',count:1,delay:80}]
  ],
  // Level 3
  [
    [{type:'stunBaton',count:1,delay:80},{type:'commando',count:1,delay:70}],
    [{type:'sniper',count:1,delay:100},{type:'cat',count:2,delay:55}],
    [{type:'armoredCat',count:1,delay:70},{type:'stunBaton',count:1,delay:80}]
  ],
  // Level 4
  [
    [{type:'commando',count:1,delay:60},{type:'sniper',count:1,delay:90}],
    [{type:'guardDog',count:1,delay:0},{type:'cat',count:2,delay:60}],
    [{type:'armoredCat',count:1,delay:65},{type:'stunBaton',count:1,delay:70},{type:'laserCat',count:1,delay:80}]
  ],
  // Level 5
  [
    [{type:'guardDog',count:1,delay:0},{type:'commando',count:1,delay:60}],
    [{type:'sniper',count:1,delay:70},{type:'armoredCat',count:1,delay:60}],
    [{type:'guardDog',count:1,delay:0},{type:'stunBaton',count:1,delay:60}]
  ]
];

let currentWave = 0, waveSpawnTimer = 0, waveSpawnQueue = [];
let waveActive = false, waveClearDelay = 0;

function startLevel(lv){
  level = lv;
  enemies = [];
  projectiles = [];
  pickups = [];
  particles = [];
  dmgNumbers = [];
  dodgeTrail = [];
  currentWave = 0;
  waveActive = false;
  waveClearDelay = 0;
  levelBannerTimer = 60;
  if(lv === 1) controlsHintTimer = 300; // 5 seconds of controls hint on level 1
  resetPlayer();
  startWave();
}

function startWave(){
  if(currentWave >= LEVEL_WAVES[Math.min(level-1,4)].length){
    // All waves done => boss or level complete
    if(level === 3 || level === 5){
      triggerRadioComm('preBoss');
      initBoss();
      bossEntrance = true;
      bossEntranceTimer = 60;
      const bossType = level === 3 ? 'colonelClaw' : 'drWhiskers';
      const dialogue = BOSS_DIALOGUE[bossType];
      bossPhaseTaunted = {};
      gameState = 'bossIntro';
      startBossDialogue(dialogue.entrance, ()=>{
        gameState = 'boss';
      });
    } else if(level === 2 || level === 4){
      gameState = 'codeScreen';
      showCodeScreen();
    } else {
      levelComplete();
    }
    return;
  }
  waveSpawnQueue = [];
  const waveDef = LEVEL_WAVES[Math.min(level-1,4)][currentWave];
  for(const group of waveDef){
    for(let i=0;i<group.count;i++){
      waveSpawnQueue.push({type:group.type, timer: group.delay * i + 30});
    }
  }
  waveActive = true;
}

function spawnEnemy(type){
  const def = ENEMY_DEFS[type];
  const side = Math.random()<0.5 ? -1 : 1;
  const ex = side < 0 ? -20 : BASE_W+20;
  const ey = GROUND_Y - Math.random()*80;
  enemies.push({
    x: ex, y: ey,
    type, hp: def.hp, maxHp: def.hp,
    speed: def.speed * (0.8 + Math.random()*0.4),
    facing: side < 0 ? 1 : -1,
    animFrame: 0, animTimer: 0,
    score: def.score, color: def.color,
    w: def.w, h: def.h,
    shootTimer: def.shootRate || 0,
    shootRate: def.shootRate || 999,
    stuns: def.stuns || false,
    hitFlash: 0,
    meleeCooldown: 0,
    state: 'chase'
  });
}

function updateEnemies(){
  // Spawn from queue
  for(let i=waveSpawnQueue.length-1;i>=0;i--){
    waveSpawnQueue[i].timer--;
    if(waveSpawnQueue[i].timer <= 0){
      spawnEnemy(waveSpawnQueue[i].type);
      waveSpawnQueue.splice(i,1);
    }
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    // Chase player
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    e.facing = dx > 0 ? 1 : -1;

    if(dist > 30){
      e.x += (dx/dist) * e.speed;
      e.y += (dy/dist) * e.speed * 0.5;
    }

    // Keep in ground area
    e.y = Math.max(60, Math.min(GROUND_Y, e.y));

    // Animation
    e.animTimer++;
    if(e.animTimer > 8){ e.animFrame++; e.animTimer = 0; }

    // Hit flash
    if(e.hitFlash > 0) e.hitFlash--;

    // Shooting
    if(e.shootRate < 999){
      e.shootTimer--;
      if(e.shootTimer <= 0){
        e.shootTimer = e.shootRate;
        const ptype = e.type === 'sniper' ? 'sniperBullet' : 'laser';
        const pdx = player.x - e.x, pdy = player.y - e.y;
        const pd = Math.sqrt(pdx*pdx+pdy*pdy)||1;
        projectiles.push({
          x: e.x, y: e.y - 5,
          vx: (pdx/pd)*2, vy: (pdy/pd)*2,
          type: ptype, life: 90, damage: 1, fromEnemy: true
        });
        if(ptype === 'laser') sfxLaser();
      }
    }

    // Melee cooldown
    if(e.meleeCooldown > 0) e.meleeCooldown--;

    // Check if hit by player attack FIRST (before melee)
    let enemyWasHit = false;
    const atk = playerAttackHitbox();
    if(atk && e.hitFlash <= 0){
      if(e.x > atk.x && e.x < atk.x+atk.w && e.y-10 > atk.y && e.y-10 < atk.y+atk.h){
        e.hp -= player.damage;
        e.hitFlash = 8;
        enemyWasHit = true;
        spawnHitParticles(e.x, e.y-10, e.color);
        spawnDmg(e.x, e.y-20, `-${player.damage}`, P.yellow);
        sfxBite();

        // Knockback enemy away on hit
        const kbx = (e.x - player.x);
        const kby = (e.y - player.y);
        const kbd = Math.sqrt(kbx*kbx+kby*kby)||1;
        e.x += (kbx/kbd) * 70;
        e.y += (kby/kbd) * 30;
        e.x = Math.max(10, Math.min(BASE_W-10, e.x));
        e.y = Math.max(60, Math.min(GROUND_Y, e.y));

        if(e.hp <= 0){
          score += e.score;
          comboCount++;
          comboTimer = 90;
          if(comboCount > 2) sfxCombo();
          spawnDeathParticles(e.x, e.y-10, e.color);
          spawnDmg(e.x, e.y-30, `+${e.score}`, P.yellow);

          // Track kills for radio comms
          levelKillCount++;
          if(levelKillCount === 5) triggerRadioComm('kills:5');
          if(levelKillCount === 10) triggerRadioComm('kills:10');

          // Random pickup drop
          if(Math.random() < 0.35){
            const types = ['health','bone','shield'];
            pickups.push({x:e.x, y:e.y, type:types[Math.floor(Math.random()*3)], life:300, bob:Math.random()*6});
          }

          enemies.splice(i,1);
          continue;
        }
      }
    }

    // Melee collision with player — skip if player is attacking or enemy was just hit
    if(dist < 22 && e.meleeCooldown <= 0 && !player.attacking && !enemyWasHit){
      if(e.stuns && player.stunTimer <= 0){
        player.stunTimer = 40;
        sfxStun();
        spawnDmg(player.x, player.y-30, 'STUN!', P.purple);
      }
      hurtPlayer();
      e.meleeCooldown = 60; // 1 second cooldown per enemy

      // Knockback enemy away from player after hit
      const kbx = (e.x - player.x);
      const kby = (e.y - player.y);
      const kbd = Math.sqrt(kbx*kbx+kby*kby)||1;
      e.x += (kbx/kbd) * 70;
      e.y += (kby/kbd) * 30;
      e.x = Math.max(10, Math.min(BASE_W-10, e.x));
      e.y = Math.max(60, Math.min(GROUND_Y, e.y));
    }
  }

  // Check wave complete
  if(waveActive && enemies.length === 0 && waveSpawnQueue.length === 0){
    waveClearDelay++;
    if(waveClearDelay > 40){
      waveClearDelay = 0;
      currentWave++;
      startWave();
    }
  }

  // Combo timer
  if(comboTimer > 0){
    comboTimer--;
    if(comboTimer <= 0) comboCount = 0;
  }
}

function drawEnemies(){
  for(const e of enemies){
    if(e.hitFlash > 0 && frame%2===0){
      ctx.globalAlpha = 0.6;
    }
    drawEnemyCat(e.x, e.y, e.facing, e.animFrame, e.type);
    ctx.globalAlpha = 1;

    // HP bar (always show for enemies)
    const bw = e.w;
    SR(e.x-bw/2, e.y-e.h-8, bw, 4, P.redDark);
    SR(e.x-bw/2, e.y-e.h-8, bw*(e.hp/e.maxHp), 4, P.red);
    SR(e.x-bw/2, e.y-e.h-8, bw*(e.hp/e.maxHp), 2, P.lava);

    // Warning indicator when enemy is close and about to attack
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < 60 && e.meleeCooldown <= 0){
      ctx.fillStyle = P.red;
      ctx.font = `${S(10)}px 'Press Start 2P', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('!', S(e.x), S(e.y - e.h - 14));
      ctx.textAlign = 'left';
    }

    // Off-screen arrow indicators
    if(e.x < 10){
      SR(2, e.y-4, 8, 8, P.red);
      SR(2, e.y-2, 4, 4, P.lava);
    } else if(e.x > BASE_W-10){
      SR(BASE_W-10, e.y-4, 8, 8, P.red);
      SR(BASE_W-6, e.y-2, 4, 4, P.lava);
    }
  }
}

// ============================================================
// PROJECTILE SYSTEM
// ============================================================
function updateProjectiles(){
  for(let i=projectiles.length-1;i>=0;i--){
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if(p.life<=0 || p.x<-20 || p.x>BASE_W+20 || p.y<-20 || p.y>BASE_H+20){
      projectiles.splice(i,1); continue;
    }
    // Hit player
    if(p.fromEnemy){
      const dx = p.x - player.x, dy = p.y - (player.y-10);
      if(Math.abs(dx)<14 && Math.abs(dy)<14){
        hurtPlayer();
        spawnHitParticles(p.x, p.y, P.red);
        projectiles.splice(i,1);
      }
    }
  }
}

function drawProjectiles(){
  for(const p of projectiles){
    drawProjectile(p.x, p.y, p.type);
  }
}

// ============================================================
// PICKUP SYSTEM
// ============================================================
let pickups = [];

function updatePickups(){
  for(let i=pickups.length-1;i>=0;i--){
    const pk = pickups[i];
    pk.life--;
    pk.bob += 0.08;
    if(pk.life <= 0){ pickups.splice(i,1); continue; }

    // Collect
    const dx = pk.x - player.x, dy = pk.y - player.y;
    if(Math.abs(dx)<16 && Math.abs(dy)<16){
      switch(pk.type){
        case 'health': lives = Math.min(7, lives+1); spawnDmg(pk.x,pk.y-20,'+HP',P.red); break;
        case 'bone':   score += 500; spawnDmg(pk.x,pk.y-20,'+500',P.yellow); break;
        case 'shield': player.shieldTimer = 180; spawnDmg(pk.x,pk.y-20,'SHIELD',P.blue); break;
      }
      sfxPickup();
      spawnParticles(pk.x, pk.y, 6, [P.yellow,P.cream], {speed:2, size:2});
      pickups.splice(i,1);
    }
  }
}

function drawPickups(){
  for(const pk of pickups){
    // Blink when about to expire
    if(pk.life < 60 && frame%6<3) continue;
    drawPickup(pk.x, pk.y, pk.type, pk.bob);
  }
}

// BOSS SYSTEM
// ============================================================
let boss = null;

function initBoss(){
  if(level === 3){
    boss = {
      type: 'colonelClaw', x: BASE_W + 40, y: GROUND_Y - 2,
      hp: 20, maxHp: 20,
      phase: 1, phaseTimer: 0,
      animFrame: 0, animTimer: 0,
      attackTimer: 60, attackPattern: 0, attackCount: 0, restTimer: 0,
      hitFlash: 0, facing: -1, speed: 0.8,
      active: false
    };
  } else {
    boss = {
      type: 'drWhiskers', x: BASE_W + 40, y: GROUND_Y - 2,
      hp: 32, maxHp: 32,
      phase: 1, phaseTimer: 0,
      animFrame: 0, animTimer: 0,
      attackTimer: 80, attackPattern: 0, attackCount: 0, restTimer: 0,
      hitFlash: 0, facing: -1, speed: 0.6,
      active: false
    };
  }
}

function updateBoss(){
  if(!boss) return;

  if(bossEntrance){
    bossEntranceTimer--;
    boss.x -= 1.5;
    if(bossEntranceTimer <= 0){
      bossEntrance = false;
      boss.active = true;
      boss.x = BASE_W - 100;
    }
    return;
  }

  if(!boss.active) return;

  boss.animTimer++;
  if(boss.animTimer > 8){ boss.animFrame++; boss.animTimer = 0; }
  if(boss.hitFlash > 0) boss.hitFlash--;

  // Movement
  const dx = player.x - boss.x, dy = player.y - boss.y;
  const dist = Math.sqrt(dx*dx+dy*dy)||1;
  boss.facing = dx > 0 ? 1 : -1;

  // Phase transitions
  const hpPct = boss.hp / boss.maxHp;
  boss.phase = hpPct > 0.6 ? 1 : hpPct > 0.3 ? 2 : 3;
  const speedMult = boss.phase === 3 ? 1.5 : boss.phase === 2 ? 1.2 : 1;

  // Rest/exhaustion after 3 attacks
  if(boss.restTimer > 0){
    boss.restTimer--;
    // Boss is exhausted — don't move or attack, just breathe
    if(frame % 20 === 0) spawnParticles(boss.x, boss.y - 40, 2, [P.gray, P.grayDark], {speed:0.5, size:2, upBias:1});
    // Still vulnerable to melee
    if(dist < 30){ hurtPlayer(); }
  } else {

  if(dist > 50){
    boss.x += (dx/dist) * boss.speed * speedMult;
    boss.y += (dy/dist) * boss.speed * speedMult * 0.3;
  }
  boss.y = Math.max(60, Math.min(GROUND_Y, boss.y));

  // Attacks
  boss.attackTimer--;
  if(boss.attackTimer <= 0){
    boss.attackPattern = (boss.attackPattern + 1) % 3;
    boss.attackCount = (boss.attackCount || 0) + 1;
    const rate = boss.phase === 3 ? 40 : boss.phase === 2 ? 55 : 70;
    boss.attackTimer = rate;

    // After 3 attacks, take a rest
    if(boss.attackCount >= 3){
      boss.attackCount = 0;
      boss.restTimer = 180; // 3 seconds at 60fps
      spawnDmg(boss.x, boss.y - 50, 'TIRED!', P.gray);
    }

    if(boss.type === 'colonelClaw'){
      if(boss.attackPattern === 0){
        // Slash
        projectiles.push({
          x: boss.x + boss.facing*30, y: boss.y - 20,
          vx: boss.facing*4, vy: 0,
          type: 'bossSlash', life: 30, damage: 1, fromEnemy: true
        });
        sfxBossHit();
      } else {
        // Charge
        boss.x += boss.facing * 40;
        shakeDur = 5;
        sfxExplosion();
        spawnExplosion(boss.x, boss.y - 20);
      }
    } else { // drWhiskers
      if(boss.attackPattern === 0){
        // Orb spread
        for(let a=-1;a<=1;a++){
          projectiles.push({
            x: boss.x, y: boss.y - 20,
            vx: boss.facing*3, vy: a*1.5,
            type: 'bossOrb', life: 80, damage: 1, fromEnemy: true
          });
        }
        sfxLaser();
      } else if(boss.attackPattern === 1){
        // EMP burst
        sfxEmp();
        shakeDur = 8;
        spawnParticles(boss.x, boss.y-20, 20, [P.purple, P.blue, P.cream], {speed:4, size:4});
        // Stun nearby player
        if(dist < 80){
          player.stunTimer = 30;
          spawnDmg(player.x, player.y-30, 'EMP!', P.purple);
        }
      } else {
        // Laser sweep
        for(let i=0;i<5;i++){
          projectiles.push({
            x: boss.x + boss.facing*20, y: boss.y - 30 + i*12,
            vx: boss.facing*5, vy: (i-2)*0.5,
            type: 'laser', life: 60, damage: 1, fromEnemy: true
          });
        }
        sfxLaser();
      }
    }
  }

  // Melee collision
  if(dist < 30){ hurtPlayer(); }

  } // end of non-rest block

  // Check player attack
  const atk = playerAttackHitbox();
  if(atk && boss.hitFlash <= 0){
    if(boss.x > atk.x-10 && boss.x < atk.x+atk.w+10 && boss.y-20 > atk.y && boss.y-20 < atk.y+atk.h){
      boss.hp -= player.damage;
      boss.hitFlash = 5;
      sfxBossHit();
      spawnHitParticles(boss.x, boss.y-20, P.orange);
      spawnDmg(boss.x, boss.y-40, `-${player.damage}`, P.yellow);
      shakeDur = 3;

      // Phase taunt at HP thresholds
      const hpPct = boss.hp / boss.maxHp;
      const bossType = boss.type;
      const dialogue = BOSS_DIALOGUE[bossType];
      if(hpPct <= 0.66 && !bossPhaseTaunted[1] && dialogue.phaseTaunts[0]){
        bossPhaseTaunted[1] = true;
        radioComm = {speaker: dialogue.phaseTaunts[0].s, text: dialogue.phaseTaunts[0].t, timer: 150, maxTimer: 150, fade: 1};
      }
      if(hpPct <= 0.33 && !bossPhaseTaunted[2] && dialogue.phaseTaunts[1]){
        bossPhaseTaunted[2] = true;
        radioComm = {speaker: dialogue.phaseTaunts[1].s, text: dialogue.phaseTaunts[1].t, timer: 150, maxTimer: 150, fade: 1};
      }

      if(boss.hp <= 0){
        // Boss defeated — show defeat dialogue
        sfxBossDie();
        spawnExplosion(boss.x, boss.y - 20);
        spawnExplosion(boss.x-20, boss.y);
        spawnExplosion(boss.x+20, boss.y-30);
        score += bossType === 'colonelClaw' ? 5000 : 10000;
        shakeDur = 20;
        radioComm = null;
        boss = null;

        gameState = 'bossDefeat';
        startBossDialogue(dialogue.defeat, null);
      }
    }
  }
}

function drawBoss(){
  if(!boss) return;
  if(boss.hitFlash > 0 && frame%2===0) ctx.globalAlpha = 0.5;

  if(boss.type === 'colonelClaw'){
    drawColonelClaw(boss.x, boss.y, boss.animFrame, boss.hp, boss.maxHp);
  } else {
    drawDrWhiskers(boss.x, boss.y, boss.animFrame, boss.hp, boss.maxHp);
  }
  ctx.globalAlpha = 1;

  // Boss HP bar at top - 32-bit styled with glow
  const bw = 200;
  const hpFill = bw*(boss.hp/boss.maxHp);
  // Outer glow
  ctx.globalAlpha = 0.15;
  SR(BASE_W/2-bw/2-6, 26, bw+12, 16, P.red);
  ctx.globalAlpha = 0.85;
  // Border
  SR(BASE_W/2-bw/2-3, 27, bw+6, 14, P.grayDark);
  ctx.globalAlpha = 1;
  SR(BASE_W/2-bw/2-1, 29, bw+2, 10, P.black);
  // Fill with gradient
  SRG(BASE_W/2-bw/2, 30, hpFill, 8, P.lava, P.redDark);
  SR(BASE_W/2-bw/2, 30, hpFill, 2, P.lavaBright);     // top gleam
  SR(BASE_W/2-bw/2, 36, hpFill, 2, P.redDeep);         // bottom shadow

  // Boss name with shadow
  ctx.textAlign = 'center';
  drawText(boss.type === 'colonelClaw' ? 'COL. CLAW' : 'DR. WHISKERS', BASE_W/2, 26, P.yellow, 7);
  ctx.textAlign = 'left';
}

// LEVEL INTRO SCREEN
// ============================================================
function startLevelIntro(lv){
  level = lv;
  gameState = 'levelIntro';
  introTimer = 0;
  introTextIndex = 0;
  introCharIndex = 0;
  introTickTimer = 0;
}

function updateLevelIntro(){
  introTimer++;
  // Typewriter effect for speaker-tagged lines
  const intro = LEVEL_INTROS[Math.min(level-1, 4)];
  introTickTimer++;
  if(introTickTimer >= 2){
    introTickTimer = 0;
    if(introTextIndex < intro.lines.length){

        if(introCharIndex % 3 === 0) playTone(800,'square',0.02,0.05);
      } else {
        introCharIndex = 0;
        introTextIndex++;
      }
    }
  }
}

let codeAnswer = '', codeTimer = 0, codeScramble = '', codeHint = '';

function showCodeScreen(){
  const words4 = [
    'BARK','WOOF','BITE','HOWL','PAWS','BONE','FANG','TAIL','PACK','MUTT',
    'PELT','HUNT','CLAW','YELP','WHIP','LICK','PLAY','CHEW','ROMP','DASH',
    'BOLT','LEAP','TROT','WAGS','RUFF','SHED','COAT','PANT','YAPS','DIGS',
    'NIPS','SITS','STAY','ROLL','CATS','FOES','DOGS','SPOT','DUKE','KING',
    'BEAR','WOLF','FURY','GRIT','SNAP','SNARL','HIDE','LURK','RAID','CREW'
  ];
  const words6 = [
    'GROWLS','KENNEL','MUZZLE','BARKED','CANINE','PAWING','BITING','CHASED',
    'SNARLS','HEELED','COLLAR','HOWLED','PATROL','SNIFFS','WOOFED','LICKED',
    'POUNCE','DASHED','ROLLED','TRICKS','WANDER','GUARDS','RESCUE','TREATS',
    'JUMPED','SPRUNG','BITTEN','CLAWED','YELPED','CHEWED','SNOUTS','HUNTER',
    'FIERCE','FRENZY','ATTACK','COMBAT','STRIKE','RAIDER','BANDIT','AMBUSH',
    'SNIPER','DEPLOY','BREACH','RECOIL','EVADER','DECOYS','BRAWLS','COBRAS',
    'VAULTS','SHIELD'
  ];
  const words = level === 4 ? words6 : words4;
  codeAnswer = words[Math.floor(Math.random()*words.length)];
  codeScramble = codeAnswer.split('').sort(()=>Math.random()-0.5).join('');
  codeHint = `${codeAnswer.length} LETTERS - UNSCRAMBLE`;
  codeTimer = 60 * 60; // 60 seconds at 60fps

  document.getElementById('codePanel').style.display = 'block';
  document.getElementById('codeField').value = '';
  document.getElementById('codeMsg').textContent = '';
  document.getElementById('scrambleDisplay').textContent = codeScramble;
  document.getElementById('decodeHint').textContent = codeHint;
  document.getElementById('timerDisplay').textContent = 'T-60';
  document.getElementById('codeField').focus();
}

function submitCode(){
  const val = document.getElementById('codeField').value.toUpperCase().trim();
  if(val === codeAnswer){
    document.getElementById('codePanel').style.display = 'none';
    sfxLevelUp();
    score += 2000;
    levelComplete();
  } else {
    document.getElementById('codeMsg').textContent = 'WRONG CODE - TRY AGAIN';
    document.getElementById('codeField').value = '';
    sfxHit();
    shakeDur = 5;
  }
}
// Make submitCode global for button onclick
window.submitCode = submitCode;

function updateCodeScreen(){
  codeTimer--;
  const sec = Math.max(0, Math.ceil(codeTimer/60));
  document.getElementById('timerDisplay').textContent = `T-${sec}`;
  // Scramble animation
  if(frame%20===0){
    const display = codeScramble.split('');
    const idx = Math.floor(Math.random()*display.length);
    const idx2 = Math.floor(Math.random()*display.length);
    [display[idx], display[idx2]] = [display[idx2], display[idx]];
    document.getElementById('scrambleDisplay').textContent = display.join('');
  }
  if(codeTimer <= 0){
    document.getElementById('codePanel').style.display = 'none';
    hurtPlayer();
    hurtPlayer();
    if(gameState !== 'gameOver') levelComplete();
  }
}

function triggerRadioComm(trigger){
  if(radioComm) return; // don't interrupt active comm
  const key = level + ':' + trigger;
  if(radioTriggered[key]) return;
  const comms = RADIO_COMMS[Math.min(level-1,4)];
  const comm = comms.find(c => c.trigger === trigger);
  if(comm){
    radioTriggered[key] = true;
    radioComm = {speaker: comm.s, text: comm.t, timer: comm.dur, maxTimer: comm.dur, fade: 1};
  }
}

function updateRadioComm(){
  if(!radioComm) return;
  radioComm.timer--;
  if(radioComm.timer < 30) radioComm.fade = radioComm.timer / 30;
  if(radioComm.timer <= 0) radioComm = null;
}

function drawRadioComm(){
  if(!radioComm) return;
  ctx.globalAlpha = Math.min(1, radioComm.fade) * 0.85;
  // Background box
  SR(8, 8, 280, 36, 'rgba(0,0,0,0.8)');
  SRC(8, 8, 280, 36, SPEAKER_COLORS[radioComm.speaker] || P.hudGreen);
  ctx.globalAlpha = Math.min(1, radioComm.fade);
  // Speaker portrait (colored square)
  SR(12, 12, 28, 28, SPEAKER_COLORS[radioComm.speaker] || P.hudGreen);
  SR(14, 14, 24, 24, '#111111');
  drawText(radioComm.speaker, 26, 32, SPEAKER_COLORS[radioComm.speaker] || P.hudGreen, 5);
  // Message text
  drawText(radioComm.text, 46, 22, P.cream, 5);
  ctx.globalAlpha = 1;
}

function startBossDialogue(lines, onComplete){
  bossDialogueLines = lines;
  bossDialogueIndex = 0;
  bossDialogueCharIndex = 0;
  bossDialogueTickTimer = 0;
  bossDialogueTimer = 0;
  bossDialogueOnComplete = onComplete || null;
}
let bossDialogueOnComplete = null;

function updateBossDialogue(){
  if(!bossDialogueLines.length) return false;
  bossDialogueTimer++;
  bossDialogueTickTimer++;
  if(bossDialogueTickTimer >= 2){
    bossDialogueTickTimer = 0;
    if(bossDialogueIndex < bossDialogueLines.length){
      const line = bossDialogueLines[bossDialogueIndex].t;
      if(bossDialogueCharIndex < line.length){
        bossDialogueCharIndex++;
        if(bossDialogueCharIndex % 3 === 0) playTone(500,'square',0.02,0.04);
      } else {
        // Pause before next line
        bossDialogueCharIndex = 0;
        bossDialogueIndex++;
      }
    }
  }
  // Advance on Enter if all text shown
  if(bossDialogueIndex >= bossDialogueLines.length){
    if(justPressed['Enter'] || justPressed['NumpadEnter'] || bossDialogueTimer > 300){
      bossDialogueLines = [];
      if(bossDialogueOnComplete) bossDialogueOnComplete();
      return false;
    }
  }
  // Skip to end on Space
  if(justPressed['Space'] && bossDialogueIndex < bossDialogueLines.length){
    bossDialogueIndex = bossDialogueLines.length;
  }
  return true; // dialogue still active
}

function drawBossDialogue(){
  if(!bossDialogueLines.length) return;
  // Dark overlay
  ctx.globalAlpha = 0.6;
  SR(0, BASE_H/2 - 60, BASE_W, 120, '#000000');
  ctx.globalAlpha = 1;
  SRC(10, BASE_H/2 - 58, BASE_W-20, 116, P.hudGreen);

  ctx.textAlign = 'left';
  const startY = BASE_H/2 - 45;
  const maxVisible = 4; // show last 4 lines
  const firstVisible = Math.max(0, Math.min(bossDialogueIndex, bossDialogueLines.length) - maxVisible + (bossDialogueIndex < bossDialogueLines.length ? 1 : 0));

  for(let i = firstVisible; i < bossDialogueLines.length; i++){
    const drawIdx = i - firstVisible;
    if(drawIdx >= maxVisible) break;
    const lineY = startY + drawIdx * 22;
    const entry = bossDialogueLines[i];
    const speakerTag = entry.s + ': ';
    const speakerColor = SPEAKER_COLORS[entry.s] || P.cream;
    const tagWidth = speakerTag.length * 7;

    if(i < bossDialogueIndex){
      drawText(speakerTag, 30, lineY, speakerColor, 7);
      drawText(entry.t, 30 + tagWidth, lineY, P.cream, 7);
    } else if(i === bossDialogueIndex){
      drawText(speakerTag, 30, lineY, speakerColor, 7);
      drawText(entry.t.substring(0, bossDialogueCharIndex), 30 + tagWidth, lineY, P.cream, 7);
    }
  }

  // Continue prompt
  if(bossDialogueIndex >= bossDialogueLines.length){
    ctx.textAlign = 'center';
    const goColor = frame%30<15 ? P.yellow : P.cream;
    drawText('PRESS ENTER', BASE_W/2, startY + maxVisible * 22, goColor, 6);
  }
  ctx.textAlign = 'left';
}

// ============================================================
function drawCRTEffect(){
  // SNES/Genesis-era scanlines: visible dark gap every 2 pixel rows
  const scanStep = Math.max(2, Math.floor(S(2)));
  const scanH = Math.max(1, Math.floor(S(1)));
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  for(let y=0; y<canvas.height; y+=scanStep){
    ctx.fillRect(0, y, canvas.width, scanH);
  }
  // Secondary faint line between scanlines (phosphor gap)
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for(let y=scanH; y<canvas.height; y+=scanStep){
    ctx.fillRect(0, y, canvas.width, scanH);
  }

  // RGB phosphor column tinting (CRT sub-pixel structure)
  const cw = Math.max(1, Math.round(S(1)));
  ctx.globalAlpha = 0.022;
  for(let x=0; x<canvas.width; x+=cw*3){
    ctx.fillStyle = '#ff3030'; ctx.fillRect(x,        0, cw, canvas.height);
    ctx.fillStyle = '#30ff30'; ctx.fillRect(x+cw,     0, cw, canvas.height);
    ctx.fillStyle = '#3030ff'; ctx.fillRect(x+cw*2,   0, cw, canvas.height);
  }
  ctx.globalAlpha = 1;

  // Vignette — stronger corners like a real CRT TV
  const grd = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height*0.28,
    canvas.width/2, canvas.height/2, canvas.height*0.78
  );
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(0.65, 'rgba(0,0,0,0.08)');
  grd.addColorStop(1, 'rgba(0,0,0,0.48)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Warm color wash (32-bit era phosphor warmth)
  ctx.globalAlpha = 0.025;
  ctx.fillStyle = '#ffe8c0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;

  // Phosphor breathing — subtle brightness pulse like a CRT warming up
  const breathe = 0.004 + Math.sin(frame * 0.007) * 0.002;
  ctx.globalAlpha = breathe;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;

  // Rare color aberration (chromatic aberration)
  if(frame%180 < 2){
    ctx.globalAlpha = 0.03;
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(2, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0000ff';
    ctx.fillRect(-2, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
  }

  // Rare horizontal glitch line
  if(Math.random() < 0.005){
    const gy = Math.random() * canvas.height;
    const gh = 1 + Math.random()*2;
    ctx.drawImage(canvas, 0, gy, canvas.width, gh, Math.random()*4-2, gy, canvas.width, gh);
  }
}

// Screen border (CRT bezel) — SNES/Genesis style
function drawCRTBezel(){
  // Phosphor inner glow along top/bottom edges (screen bloom)
  const topGlow = ctx.createLinearGradient(0, 0, 0, canvas.height*0.06);
  topGlow.addColorStop(0, 'rgba(40,255,80,0.06)');
  topGlow.addColorStop(1, 'rgba(40,255,80,0)');
  ctx.fillStyle = topGlow;
  ctx.fillRect(0, 0, canvas.width, canvas.height*0.06);

  const botGlow = ctx.createLinearGradient(0, canvas.height*0.94, 0, canvas.height);
  botGlow.addColorStop(0, 'rgba(40,255,80,0)');
  botGlow.addColorStop(1, 'rgba(40,255,80,0.06)');
  ctx.fillStyle = botGlow;
  ctx.fillRect(0, canvas.height*0.94, canvas.width, canvas.height*0.06);

  // Left/right edge phosphor bloom
  const leftGlow = ctx.createLinearGradient(0, 0, canvas.width*0.04, 0);
  leftGlow.addColorStop(0, 'rgba(40,255,80,0.05)');
  leftGlow.addColorStop(1, 'rgba(40,255,80,0)');
  ctx.fillStyle = leftGlow;
  ctx.fillRect(0, 0, canvas.width*0.04, canvas.height);

  const rightGlow = ctx.createLinearGradient(canvas.width*0.96, 0, canvas.width, 0);
  rightGlow.addColorStop(0, 'rgba(40,255,80,0)');
  rightGlow.addColorStop(1, 'rgba(40,255,80,0.05)');
  ctx.fillStyle = rightGlow;
  ctx.fillRect(canvas.width*0.96, 0, canvas.width*0.04, canvas.height);

  // Screen border
  const bw = 3;
  ctx.strokeStyle = '#1a3a1a';
  ctx.lineWidth = S(bw);
  ctx.strokeRect(S(bw/2), S(bw/2), S(BASE_W-bw), S(BASE_H-bw));

  // Corner darkening (CRT curved-corner shadow)
  const cs = S(28);
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.fillRect(0, 0, cs, cs);
  ctx.fillRect(canvas.width-cs, 0, cs, cs);
  ctx.fillRect(0, canvas.height-cs, cs, cs);
  ctx.fillRect(canvas.width-cs, canvas.height-cs, cs, cs);

  // Extra corner diagonal shadow for curvature illusion
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, Math.floor(cs*0.6), Math.floor(cs*0.6));
  ctx.fillRect(canvas.width-Math.floor(cs*0.6), 0, Math.floor(cs*0.6), Math.floor(cs*0.6));
  ctx.fillRect(0, canvas.height-Math.floor(cs*0.6), Math.floor(cs*0.6), Math.floor(cs*0.6));
  ctx.fillRect(canvas.width-Math.floor(cs*0.6), canvas.height-Math.floor(cs*0.6), Math.floor(cs*0.6), Math.floor(cs*0.6));
}

// Screen transition (pixelated wipe)
let transitionTimer = 0, transitionCallback = null;
function startTransition(cb){
  transitionTimer = 30;
  transitionCallback = cb;
}
function updateTransition(){
  if(transitionTimer > 0){
    transitionTimer--;
    if(transitionTimer === 15 && transitionCallback){
      transitionCallback();
      transitionCallback = null;
    }
  }
}
function drawTransition(){
  if(transitionTimer <= 0) return;
  const progress = transitionTimer > 15 ? (30-transitionTimer)/15 : transitionTimer/15;
  const blockSize = 8;
  ctx.fillStyle = P.black;
  for(let x=0; x<BASE_W; x+=blockSize){
    for(let y=0; y<BASE_H; y+=blockSize){
      if(Math.random() < progress){
        SR(x, y, blockSize, blockSize, P.black);
      }
    }
  }
}

// ============================================================
// SCREEN SHAKE
// ============================================================
function updateShake(){
  if(shakeDur > 0){
    shakeX = (Math.random()-0.5)*shakeDur*0.8;
    shakeY = (Math.random()-0.5)*shakeDur*0.8;
    shakeDur--;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(){
  frame++;
  updateShake();
  updateTransition();

  // Clear canvas every frame to prevent ghosting
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(S(shakeX), S(shakeY));

  switch(gameState){
    case 'menu':
      drawMenu();
      if((justPressed['Enter'] || justPressed['NumpadEnter']) && transitionTimer <= 0){
        sfxMenu();
        score = 0; lives = 7; level = 1;
        if(!hasSeenPrologue){
          hasSeenPrologue = true;
          startTransition(()=>{ startPrologue(); });
        } else {
          startTransition(()=>{ startLevelIntro(1); });
        }
      }
      break;

    case 'prologue':
      updatePrologue();
      drawPrologue();
      if((justPressed['Enter']||justPressed['NumpadEnter']) && (prologueIndex >= PROLOGUE_LINES.length || prologueTimer > 60)){
        sfxMenu();
        startTransition(()=>{ startLevelIntro(1); });
      }
      if(justPressed['Space'] && prologueIndex < PROLOGUE_LINES.length){
        prologueIndex = PROLOGUE_LINES.length;
      }
      break;

    case 'levelIntro':
      updateLevelIntro();
      drawLevelIntro();
      if((justPressed['Enter']||justPressed['NumpadEnter']) && (introTextIndex >= LEVEL_INTROS[Math.min(level-1,4)].lines.length || introTimer > 300)){
        sfxMenu();
        levelKillCount = 0;
        radioTriggered = {};
        startTransition(()=>{ startLevel(level); gameState = 'playing'; triggerRadioComm('start'); });
      }
      if(justPressed['Space'] && introTextIndex < LEVEL_INTROS[Math.min(level-1,4)].lines.length){
        introTextIndex = LEVEL_INTROS[Math.min(level-1,4)].lines.length;
      }
      break;

    case 'playing':
      drawBackground();
      updatePlayer();
      updateEnemies();
      updateProjectiles();
      updatePickups();
      drawPickups();
      drawProjectiles();
      drawEnemies();
      drawPlayer();
      updateParticles();
      drawParticles();
      updateDmgNumbers();
      drawDmgNumbers();
      drawHUD();
      updateRadioComm();
      drawRadioComm();
      if(levelBannerTimer > 0) levelBannerTimer--;
      break;

    case 'boss':
      drawBackground();
      updatePlayer();
      updateBoss();
      updateProjectiles();
      updatePickups();
      drawPickups();
      drawProjectiles();
      drawBoss();
      drawPlayer();
      updateParticles();
      drawParticles();
      updateDmgNumbers();
      drawDmgNumbers();
      drawHUD();
      updateRadioComm();
      drawRadioComm();
      break;

    case 'bossIntro':
      drawBackground();
      if(boss && bossEntrance) updateBoss(); // run entrance walk-in during dialogue
      drawPlayer();
      if(boss) drawBoss();
      drawHUD();
      if(!updateBossDialogue()){
        // Dialogue done, start the actual boss fight
        if(boss){
          bossEntrance = false;
          boss.active = true;
          boss.x = BASE_W - 100;
        }
        gameState = 'boss';
      }
      drawBossDialogue();
      break;

    case 'bossDefeat':
      drawBackground();
      drawPlayer();
      updateParticles();
      drawParticles();
      drawHUD();
      if(!updateBossDialogue()){
        // Defeat dialogue done
        if(level >= 5){
          victoryPhase = 0; victoryTimer = 0;
          gameState = 'victory';
        } else {
          levelComplete();
        }
      }
      drawBossDialogue();
      break;

    case 'codeScreen':
      drawBackground();
      drawPlayer();
      drawHUD();
      updateCodeScreen();
      break;

    case 'levelComplete':
      drawBackground();
      drawPlayer();
      drawLevelComplete();
      updateParticles();
      drawParticles();
      levelCompleteTimer--;
      if((justPressed['Enter']||justPressed['NumpadEnter']) && levelCompleteTimer < 120 && transitionTimer <= 0){
        sfxMenu();
        const nl = levelCompleteData.nextLevel;
        if(nl > 5){
          victoryPhase = 0; victoryTimer = 0;
          gameState = 'victory';
        } else {
          startTransition(()=>{ startLevelIntro(nl); });
        }
      }
      break;

    case 'gameOver':
      drawGameOver();
      updateParticles();
      drawParticles();
      if((justPressed['Enter']||justPressed['NumpadEnter']) && transitionTimer <= 0){
        sfxMenu();
        startTransition(()=>{ score=0; lives=5; level=1; gameState='menu'; });
      }
      break;

    case 'victory':
      drawVictory();
      updateParticles();
      drawParticles();
      if((justPressed['Enter']||justPressed['NumpadEnter']) && transitionTimer <= 0){
        if(victoryPhase === 0 && victoryTimer > 120){
          victoryPhase = 1; victoryTimer = 0;
        } else if(victoryPhase === 1 && victoryTimer > 500){
          sfxMenu();
          startTransition(()=>{ score=0; lives=5; level=1; gameState='menu'; });
        }
      }
      break;
  }

  drawTransition();
  ctx.restore();

  // CRT effects are drawn without shake transform
  drawCRTEffect();
  drawCRTBezel();

  clearJustPressed();
  requestAnimationFrame(gameLoop);
}

// Start the game
requestAnimationFrame(gameLoop);

</script>
